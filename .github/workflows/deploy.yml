name: Deploy

on:
  push:
    branches: [main]

env:
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/minezone-frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy frontend
        run: |
          az containerapp update \
            --name frontend \
            --resource-group minezone-web \
            --image ${{ env.IMAGE_PREFIX }}/minezone-frontend:${{ github.sha }}

  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/minezone-backend:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy backend
        run: |
          az containerapp update \
            --name backend \
            --resource-group minezone-web \
            --image ${{ env.IMAGE_PREFIX }}/minezone-backend:${{ github.sha }} \
            --set-env-vars "ML_URL=https://ml.internal.ambitiouspebble-b2d2aa7b.canadacentral.azurecontainerapps.io"

  deploy-ml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ml
        uses: docker/build-push-action@v5
        with:
          context: ./ml
          push: true
          tags: ${{ env.IMAGE_PREFIX }}/minezone-ml:${{ github.sha }}

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy ml
        run: |
          az containerapp update \
            --name ml \
            --resource-group minezone-web \
            --image ${{ env.IMAGE_PREFIX }}/minezone-ml:${{ github.sha }}
            
      - name: Update ml-trainer image
        run: |
          az containerapp job update \
            --name ml-trainer \
            --resource-group minezone-web \
            --image ${{ env.IMAGE_PREFIX }}/minezone-ml:${{ github.sha }}
