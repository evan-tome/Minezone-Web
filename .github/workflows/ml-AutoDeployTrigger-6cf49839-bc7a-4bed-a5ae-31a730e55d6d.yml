name: Trigger auto deployment for ml

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/ml-AutoDeployTrigger-6cf49839-bc7a-4bed-a5ae-31a730e55d6d.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.ML_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.ML_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.ML_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}/ml
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ghcr.io
          registryUsername: ${{ secrets.ML_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.ML_REGISTRY_PASSWORD }}
          containerAppName: ml
          resourceGroup: minezone-web
          imageToBuild: ghcr.io/ml:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


